name: Build

on:
  push:
    branches: [main]
    paths:
      - 'app/src/**'
      - 'app/build.gradle.kts'
      - 'wear/src/**'
      - 'wear/build.gradle.kts'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'gradle/wrapper/**'
      - '.github/workflows/build.yml'

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: mkdir -p app/src/main/assets

      - uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
        env:
          OUTPUT: app/src/main/assets/changelog.md

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.jks

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run Unit Tests
        run: xvfb-run ./gradlew testDebugUnitTest

      - name: Build Release APK
        run: xvfb-run ./gradlew assembleRelease renameReleaseApk :wear:assembleRelease :wear:renameWearReleaseApk --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: flex-debug-build
          path: |
            app/build/outputs/apk/release/renamed/*.apk
            wear/build/outputs/apk/release/renamed/*.apk
          retention-days: 7
