name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version name
        id: appversion
        run: echo "name=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -1)" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: mkdir -p app/src/main/assets

      - uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag "v${{ steps.appversion.outputs.name }}"
        env:
          OUTPUT: app/src/main/assets/changelog.md

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.jks

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run Unit Tests
        run: xvfb-run ./gradlew testDebugUnitTest

      - name: Build Release APK
        run: xvfb-run ./gradlew assembleRelease renameReleaseApk :wear:assembleRelease :wear:renameWearReleaseApk --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Generate version tag
        id: version
        run: |
          VERSION=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -1)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${VERSION}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push tag (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.version.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: |
            app/build/outputs/apk/release/renamed/*.apk
            wear/build/outputs/apk/release/renamed/*.apk
          generate_release_notes: true

      - name: Get release notes for manifest
        id: cliff_manifest
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all

      - name: Update version manifest in Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          VERSION_NAME="${{ steps.version.outputs.name }}"
          VERSION_CODE=$(sed -n 's/.*versionCode = \([0-9]*\).*/\1/p' app/build.gradle.kts | head -1)
          TAG="${{ steps.version.outputs.tag }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/flex-v${VERSION_NAME}.apk"
          CHANGELOG="${{ steps.cliff_manifest.outputs.content }}"
          jq -n \
            --argjson vc "$VERSION_CODE" \
            --arg vn "$VERSION_NAME" \
            --arg dl "$DOWNLOAD_URL" \
            --arg cl "$CHANGELOG" \
            '{files: {"version.json": {content: ({"versionCode": $vc, "versionName": $vn, "changelog": $cl, "downloadUrl": $dl} | tostring)}}}' \
          | curl -s -X PATCH \
              -H "Authorization: token $GIST_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/gists/$GIST_ID" \
              --data-binary @-
