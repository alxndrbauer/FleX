name: PR Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/src/**'
      - 'app/build.gradle.kts'
      - 'wear/src/**'
      - 'wear/build.gradle.kts'
      - 'build.gradle.kts'
      - 'gradle.properties'
      - 'gradle/wrapper/**'
      - '.github/workflows/pr-check.yml'

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run Unit Tests
        run: xvfb-run ./gradlew testDebugUnitTest --no-daemon

      - name: Build Debug APK
        run: xvfb-run ./gradlew assembleDebug :wear:assembleDebug --no-daemon
